<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Club Llamas antorchas  | Lecciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #aee4ff 0%, #aaf4ff 100%);
            color: #000000;
            padding: 2rem 1rem;
        }

        /* Contenedor principal */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Encabezado con estilo de antorcha */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #024024, #01255e, #0466c1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 12px rgba(39, 241, 35, 0.05);
            display: inline-block;
            padding: 0 0.5rem;
        }

        .hero .sub {
            font-size: 1.2rem;
            color: #000000;
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.4rem 1.8rem;
            border-radius: 60px;
            margin-top: 0.75rem;
            font-weight: 500;
            border: 1px solid #fed7aa;
        }

        .flame-icon {
            font-size: 2.4rem;
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(246, 0, 0, 0.3));
            margin-right: 8px;
        }

        /* cuadrícula de lecciones */
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-top: 1.5rem;
        }

        /* tarjeta individual */
        .lesson-card {
            background: #02a330;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 30px -12px rgb(3, 0, 176), 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.25s ease;
            overflow: hidden;
            border: 1px solid #000000;
            display: flex;
            flex-direction: column;
        }

        .lesson-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 32px -14px #efff11;
            border-color: #efff11;
        }

        .card-header {
            background: linear-gradient(115deg, #084ebd, #084ebd);
            padding: 1.2rem 1.4rem;
            border-bottom: 2px solid #000000;
        }

        .lesson-number {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #fffc31;
            display: inline-block;
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            color: #1a1a1a;
            background: #fffc31;
            margin-bottom: 0.6rem;
        }

        .lesson-title {
            font-size: 1.55rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.3;
            word-break: break-word;
        }

        .card-body {
            padding: 1.4rem 1.4rem 1.6rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .topic-label {
            font-weight: 600;
            color: #000000;
            background: #ffd427;
            display: inline-block;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.8rem;
            width: fit-content;
        }

        .topic-text {
            font-size: 1.1rem;
            font-weight: 500;
            background: #faf4e6;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            color: #3b2a1f;
            border-left: 5px solid #0027ed;
            margin: 0.2rem 0 0.2rem 0;
        }

        .link-area {
            margin-top: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background-color: #f91616;
            color: rgb(255, 255, 255);
            text-decoration: none;
            font-weight: 600;
            padding: 0.7rem 1rem;
            border-radius: 60px;
            transition: 0.2s;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-link:hover {
            background-color: #ea580c;
            transform: scale(0.98);
            box-shadow: 0 5px 12px rgba(234, 88, 12, 0.3);
        }

        .btn-outline {
            background: #c9ff96;
            color: #c2410c;
            border: 1px solid #fdba74;
            box-shadow: none;
        }

        .btn-outline:hover {
            background: #ffdfbe;
            color: #9a3412;
            transform: scale(0.98);
        }

        .missing-link {
            background: #f1f3f4;
            color: #6b4c3b;
            padding: 0.7rem 1rem;
            border-radius: 60px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px dashed #cbac7b;
            cursor: default;
        }

        .footer-note {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.85rem;
            color: #36a93e;
            background: #ffefdb;
            padding: 0.8rem;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(4px);
        }

        .badge-torch {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        hr {
            margin: 1rem 0;
            border: 0;
            height: 2px;
            background: linear-gradient(90deg, #ffb347, #ff8c1a, #ffb347);
            border-radius: 5px;
        }

        @media (max-width: 680px) {
            .hero h1 {
                font-size: 2rem;
            }
            .lesson-title {
                font-size: 1.3rem;
            }
            .lessons-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <div class="badge-torch">
              <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhDf52Z1kz_bDKOWG9odStsazWwMwquSFQ3jW5NuSpLMaobzc1FOC6JpaqtCXsscOdHWfqSNjDVexDeScxbiRqtH5kkMpFnr6iHwrWo-Z6qZ05a1JG1mO_EI3jYkkUcK8Y8-J4rENyvX0W8/s1600/llamas.png" alt="Llama" class="hero-icon" style="width: 48px; height: auto;">

            <h1>Lecciones de Llamas y Antorchas</h1>
            
              <img src="https://ipdea.org/img/antorchas.png" alt="Antorcha" class="hero-icon" style="width: 48px; height: auto;">
        </div>
        <div class="sub">📖 14 lecciones · Parábolas de Jesús</div>
    </div>

    <div class="lessons-grid" id="lessonsContainer">
        <!-- Las 13 lecciones se inyectarán dinámicamente con JS para mantener el código limpio y fácil de editar -->
    </div>
    <div class="footer-note">
        ✨ 2 Timoteo 2:15: "Procura con diligencia presentarte a Dios aprobado, como obrero que no tiene de qué avergonzarse, que usa bien la palabra de verdad".📖✨
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // DATOS DE LAS 13 LECCIONES (Rol de Llamas Antorchas)
    // Se puede editar fácilmente: tema y enlace
    // Para las lecciones sin enlace aún, se mostrará un mensaje 
    // y se podrá editar luego.
    // --------------------------------------------------------------
    const lecciones = [
        {
            id: 1,
            tema: "PARÁBOLA DE LOS CIMIENTOS",
            enlaceVer: "https://truewaykids.com/es/los-sabios-y-necios-constructores/",
            enlaceDescargar: "https://files.truewaykids.com/file/s1i09rf8lixpgze/NT13+ADOLESCENTES.pdf/file"
        },
        {
            id: 2,
            tema: "PARÁBOLA DE LA OVEJA Y MONEDA PERDIDA ",
            enlaceVer: "https://truewaykids.com/es/la-parabola-de-las-cosas-perdidas/" , 
            enlaceDescargar:"https://files.truewaykids.com/file/5hhy82zww94h8z6/NT15_ADOLESCENTES.pdf/file"
        },
        {
            id: 3,
            tema: "PARÁBOLA DEL HIJO PRÓDIGO",
            enlaceVer:"	https://truewaykids.com/es/el-hijo-perdido/" ,
            enlaceDescargar:"https://files.truewaykids.com/file/z2ugc3u66nhnu1z/NT16+ADOLESCENTES.pdf/file"
        },
        {
            id: 4,
            tema: "PARÁBOLA DEL SEMBRADOR ",
            enlaceVer: "https://truewaykids.com/es/parabola-del-sembrador/",
            enlaceDescargar:"https://files.truewaykids.com/file/wz6nekxkvsjl7do/NT17+ADOLESCENTES.pdf/file"
        },
        {
            id: 5,
            tema: "PARÁBOLA DE LA VIUDA Y EL JUEZ INJUSTO",
            enlaceVer: "https://truewaykids.com/es/la-viuda-persistente/" ,
            enlaceDescargar:"https://files.truewaykids.com/file/jh0vjxxjl7bdjuf/NT18+ADOLESCENTES.pdf/file"
        },
        {
            id: 6,
            tema: "PARÁBOLA DE LA SEMILLA DE MOSTAZA",
            enlaceVer: "https://truewaykids.com/es/la-semilla-de-mostaza/",
            enlaceDescargar:"https://files.truewaykids.com/file/3bj7ml6m3z2i7y9/NT19+ADOLESCENTES.pdf/file"
        },
        {
            id: 7,
            tema: "PARÁBOLA DEL BUEN SAMARITANO",
            enlaceVer: "https://truewaykids.com/es/buen-samaritano/",
            enlaceDescargar:"https://files.truewaykids.com/file/9wz65i5mfc19emv/NT20+ADOLESCENTES.pdf/file"
        },
        {
            id: 8,
            tema: "PARÁBOLA DE LOS TALENTOS",
            enlaceVer: "https://truewaykids.com/es/la-parabola-de-los-talentos/",
            enlaceDescargar:"https://files.truewaykids.com/file/6670lz8y48o9wev/NT21+ADOLESCENTES.pdf/file"   // pendiente
        },
        {
            id: 9,
            tema: "PARÁBOLA DE LA GRAN CENA",
            enlaceVer: "https://truewaykids.com/es/la-parabola-del-gran-festin/",
            enlaceDescargar:"https://files.truewaykids.com/file/lvty8d1cxkvzrfc/NT22+ADOLESCENTES.pdf/file"   // pendiente
        },
        {
            id: 10,
            tema: "PARÁBOLA DE LOS DOS DEUDORES",
            enlaceVer: "https://truewaykids.com/es/la-parabola-del-siervo-que-no-quiso-perdonar/" ,
            enlaceDescargar:"https://files.truewaykids.com/file/vmvys791o9faa3w/NT23+ADOLESCENTES.pdf/file"  // pendiente
        },
        {
            id: 11,
            tema: "PARABOLA DE LA RED",
            enlaceVer: "https://truewaykids.com/es/la-parabola-de-la-red/",
            enlaceDescargar:"https://files.truewaykids.com/file/iq32uqhju3orlok/NT68+adolescentes+La+Red.pdf/file"   // pendiente
        },
        {
            id: 12,
            tema: "PARÁBOLA DE LA FIESTA DE BODAS",
            enlace: ""   // pendiente
        },
        {
            id: 13,
            tema: "PARÁBOLA DE LOS OBREROS DE LA VIÑA ",
            enlace: ""   // pendiente
        },
        {
            id: 14,
            tema: "PARÁBOLA DE LAS DIEZ VIRGENES ",
            enlace: ""   // pendiente
        }

    ];

    // Función para renderizar todas las tarjetas
    function renderLecciones() {
        const container = document.getElementById("lessonsContainer");
        if (!container) return;

        let html = "";

        lecciones.forEach(lec => {
            const tieneEnlace = lec.enlace && lec.enlace.trim() !== "";
            // formatear tema con tipografía adecuada
            const temaMostrar = lec.tema || "Tema por definir";

            // Botón o texto según enlace
            let linkSection = "";
const tieneEnlaceVer = lec.enlaceVer && lec.enlaceVer.trim() !== "";
const tieneEnlaceDescargar = lec.enlaceDescargar && lec.enlaceDescargar.trim() !== "";

if (tieneEnlaceVer || tieneEnlaceDescargar) {
    linkSection = `
        ${tieneEnlaceVer ? `
            <a href="${lec.enlaceVer}" target="_blank" rel="noopener noreferrer" class="btn-link">
                🔗 Acceder al material 📖
            </a>
        ` : ''}
        
        ${tieneEnlaceDescargar ? `
            <a href="${lec.enlaceDescargar}" target="_blank" class="btn-link btn-outline">
                📥 Descargar Tema / lección
            </a>
        ` : ''}
        
        ${!tieneEnlaceVer && !tieneEnlaceDescargar ? `
            <div class="missing-link">
                ⏳ Enlaces no disponibles aún
            </div>
        ` : ''}
    `;
} else {
    linkSection = `
        <div class="missing-link">
            ⏳ Enlaces no disponibles aún <br> 
            <span style="font-size:0.75rem;">Próximamente se añadirá el material</span>
        </div>
    `;
}

            // Construir tarjeta
            html += `
                <div class="lesson-card">
                    <div class="card-header">
                        <div class="lesson-number">
                            📌 LECCIÓN ${lec.id} de 14
                        </div>
                        <div class="lesson-title">
                            ${escapeHtml(temaMostrar)}
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="topic-label">
                            📖 TEMA PRINCIPAL
                        </div>
                        <div class="topic-text">
                            ${escapeHtml(temaMostrar)}
                        </div>
                        <div class="link-area">
                            ${linkSection}
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // pequeña función para evitar inyección XSS (solo por seguridad)
    function escapeHtml(str) {
        if (!str) return "";
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    // Inicializar
    renderLecciones();
</script>

<!-- 
    NOTA PARA EL USUARIO:
    - Las 13 lecciones están listadas con sus temas.
    - La primera lección ya tiene el enlace PDF proporcionado.
    - Las demás lecciones (2 a 13) tienen campos de enlace vacíos. 
      Puedes editar fácilmente el array "lecciones" dentro de la etiqueta <script>
      y agregar los enlaces correspondientes en la propiedad "enlace".
    - Si deseas cambiar el tema de alguna lección, simplemente modifica "tema".
    - Diseño responsivo, con estilo "antorcha" y colores cálidos.
    - Sistema completamente funcional, puedes añadir más enlaces cuando los tengas.
-->
</body>
</html>
